# Hourly schedule pulse. The Cloudflare account's free cron slots are all
# taken by other workers, so the worker's scheduled dispatch (collection at
# 05/11/17 Rome, reminders at 10:00, per-user digests) is driven from here
# via the authenticated POST /tick route.
name: Hourly tick

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Set to "collect" to crawl now, or "geocode" to run the geocoding pass'
        required: false
        default: ''

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Pulse the worker
        run: |
          URL="https://liguria-events-bot.igor-ganov.workers.dev/tick"
          if [ -n "${{ inputs.force }}" ]; then
            URL="${URL}?force=${{ inputs.force }}"
          fi
          echo "POST $URL"
          curl -s --max-time 890 -X POST "$URL" \
            -H "x-tick-secret: ${{ secrets.TICK_SECRET }}" \
            -w '\nHTTP_STATUS=%{http_code}\n'
